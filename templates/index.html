<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Defect Detection — Live Feed</title>
  <link rel="stylesheet" href="/static/css/style.css"/>
</head>
<body>
  <nav class="nav">
    <span class="nav-brand">⬡ DefectVision</span>
    <div class="nav-links">
      <a href="/" class="active">Live Feed</a>
      <a href="/dashboard">Dashboard</a>
    </div>
  </nav>

  <main class="container">
    <div class="grid-2">

      <!-- Left: live camera stream -->
      <section class="card">
        <div class="card-header">
          <h2>Live Camera Feed</h2>
          <span class="badge badge-green" id="cam-status">● LIVE</span>
        </div>
        <div class="feed-wrap">
          <img id="live-feed" src="/video_feed" alt="Live feed"/>
        </div>
        <p class="hint">YOLOv8 bounding boxes drawn in real time. Crops are saved automatically.</p>
      </section>

      <!-- Right: upload + recent detections -->
      <section class="card">
        <div class="card-header">
          <h2>Upload Image</h2>
        </div>
        <div class="upload-zone" id="drop-zone">
          <p>Drag & drop an image or <label class="link" for="file-input">browse</label></p>
          <input type="file" id="file-input" accept="image/*" hidden/>
        </div>
        <div id="upload-preview-wrap" style="display:none">
          <img id="upload-preview" alt="preview"/>
        </div>
        <button class="btn" id="run-btn" style="display:none">Run Detection</button>
        <div id="upload-results"></div>
      </section>
    </div>

    <!-- Detection feed -->
    <section class="card mt">
      <div class="card-header">
        <h2>Recent Detections</h2>
        <button class="btn-sm" id="refresh-btn">Refresh</button>
      </div>
      <div class="table-wrap">
        <table id="det-table">
          <thead>
            <tr>
              <th>Time</th><th>Source</th><th>Class</th>
              <th>Conf</th><th>BBox</th><th>Crop</th>
            </tr>
          </thead>
          <tbody id="det-body"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="/static/js/main.js"></script>
</body>
</html>
